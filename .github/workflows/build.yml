name: Build (Windows)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Compile Odin + Raylib (Windows)
    runs-on: windows-latest

    env:
      ODIN_VERSION: dev-2026-05 # ← pin to a release tag
      ODIN_DIR: C:\odin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── LLVM (required by Odin on Windows) ────────────────────────────────
      - name: Install LLVM
        uses: KyleMayes/install-llvm-action@v2
        with:
          version: "17"

      # ── Odin compiler ──────────────────────────────────────────────────────
      - name: Install Odin
        shell: pwsh
        run: |
          $url = "https://github.com/odin-lang/Odin/releases/download/$env:ODIN_VERSION/odin-windows-amd64-$env:ODIN_VERSION.zip"
          Invoke-WebRequest $url -OutFile odin.zip
          Expand-Archive odin.zip -DestinationPath $env:ODIN_DIR
          # Odin extracts into a sub-folder — find the actual binary
          $odinBin = (Get-ChildItem -Path $env:ODIN_DIR -Filter "odin.exe" -Recurse | Select-Object -First 1).DirectoryName
          Write-Output "Odin binary found at: $odinBin"
          Add-Content $env:GITHUB_PATH $odinBin

      - name: Verify Odin install
        shell: pwsh
        run: odin version

      # ── Build ──────────────────────────────────────────────────────────────
      - name: Build game
        shell: pwsh
        run: |
          odin build . `
            -out:game.exe `
            -o:speed `
            -subsystem:windows

      # ── Upload artifact ────────────────────────────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-windows
          path: |
            game.exe
            # assets/
          if-no-files-found: error
          retention-days: 14
